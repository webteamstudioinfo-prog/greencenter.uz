<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta name="description" content="Green Center — сайт находится в разработке. По всем вопросам звоните +998 91 136-91-97">
<meta property="og:title" content="Green Center — сайт в разработке">
<meta property="og:description" content="По всем вопросам обращайтесь по телефону +998 91 136-91-97">
<meta property="og:type" content="website">
<meta property="og:url" content="https://greencenter.uz/">
<meta name="theme-color" content="#0a4a24">
<title>Green Center — сайт в разработке</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<style>
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:#0a4a24;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;position:relative;overflow:hidden}
body::before{content:"";position:absolute;inset:0;background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.06),transparent 50%),
radial-gradient(circle at 80% 80%,rgba(0,0,0,.25),transparent 55%);
pointer-events:none}
.wrap{position:relative;min-height:100%;display:flex;flex-direction:column;padding:40px 20px}
.brand{display:flex;align-items:center;gap:12px;font-size:14px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.7)}
.brand img{width:36px;height:36px;border-radius:6px}
.center{flex:1;display:flex;align-items:center;justify-content:center;text-align:center}
.box{max-width:720px}
.badge{display:inline-block;padding:8px 16px;border:1px solid rgba(255,255,255,.25);border-radius:100px;font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.85);margin-bottom:28px}
.badge .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#f59e0b;margin-right:8px;vertical-align:1px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
h1{font-size:56px;margin:0 0 20px;line-height:1.1;font-weight:700;letter-spacing:-.02em;white-space:nowrap}
.lead{color:rgba(255,255,255,.75);font-size:19px;line-height:1.5;margin:0 0 40px;max-width:520px;margin-left:auto;margin-right:auto}
.divider{width:60px;height:1px;background:rgba(255,255,255,.2);margin:0 auto 24px}
.contact-label{font-size:12px;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.55);margin-bottom:12px}
.phone{display:inline-block;font-size:38px;font-weight:600;color:#fff;text-decoration:none;letter-spacing:-.01em;transition:opacity .2s}
.phone:hover{opacity:.75}
.footer{text-align:center;color:rgba(255,255,255,.45);font-size:13px;padding-top:20px}
@media(max-width:768px){
.wrap{padding:24px 20px}
.brand{font-size:12px}
.brand img{width:32px;height:32px}
h1{font-size:32px;white-space:normal}
.lead{font-size:16px;margin-bottom:32px}
.phone{font-size:26px}
.badge{font-size:11px;padding:6px 14px;margin-bottom:24px}
}
</style>
</head>
<body>
<div class="wrap">
<div class="brand"><img src="/favicon.png" alt=""><span>Green Center</span></div>
<div class="center">
<div class="box">
<div class="badge"><span class="dot"></span>Сайт в разработке</div>
<h1>Скоро мы будем онлайн</h1>
<p class="lead">Работаем над запуском нового сайта. Пока свяжитесь с нами напрямую — ответим на все вопросы и подскажем по услугам.</p>
<div class="divider"></div>
<div class="contact-label">Контактный телефон</div>
<a class="phone" href="tel:+998911369197">+998 91 136-91-97</a>
</div>
</div>
<div class="footer">© Green Center, 2026</div>
</div>
</body>
</html>
